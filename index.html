<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我們的婚禮拍貼機</title>
    <style>
        :root {
            --primary-color: #e04d75;
            --bg-color: #fff5f7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
            text-align: center;
        }
        p.subtitle {
            font-size: 0.9rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #888;
        }
        /* 照片工作區 */
        .upload-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 2 / 1; /* 配合你 2:1 的框比例 */
            border: 2px dashed #ccc;
            border-radius: 12px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .upload-placeholder {
            text-align: center;
            pointer-events: none;
            color: #aaa;
        }
        .upload-placeholder svg {
            width: 40px;
            height: 40px;
            fill: #ccc;
            margin-bottom: 8px;
        }
        #fileInput {
            display: none;
        }
        /* 結果預覽區 */
        .result-container {
            display: none;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            text-align: center;
        }
        #resultImage {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 1px solid #eee;
        }
        .tip {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        /* 隱藏的畫布 */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Wedding Photo Booth</h1>
    <p class="subtitle">拍下美好的瞬間，帶走專屬回憶吧！</p>

    <div class="upload-container" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-placeholder" id="placeholderText">
            <svg viewBox="0 0 24 24"><path d="M19 12h-2v3H7v-3H5v3c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-3zm-1.41-4.59L13 2.83V13h-2V2.83L7.41 7.41 6 6l6-6 6 6-1.41 1.41z"/></svg>
            <div>點擊拍照或上傳照片</div>
        </div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="result-container" id="resultArea">
        <p>✨ 您的專屬照片已生成 ✨</p>
        <img id="resultImage" alt="婚禮拍貼結果">
        <p class="tip">💡 點選照片「長按」即可儲存到手機唷！</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        const resultImage = document.getElementById('resultImage');
        const placeholderText = document.getElementById('placeholderText');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 載入新人的相框 (確保此處檔名與你的相框圖檔名一致)
        const frameImage = new Image();
        frameImage.src = '框.png'; 

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            placeholderText.innerHTML = '<div>照片處理中，請稍候...</div>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const userImg = new Image();
                userImg.onload = function() {
                    // 1. 以「相框」的原始尺寸為畫布基準，確保外框不失真
                    // 備註：因您的外框是 2000x1000 (2:1)，畫布會以此大尺寸合成，下載時才清晰
                    canvas.width = frameImage.width || 2000; 
                    canvas.height = frameImage.height || 1000;

                    // 2. 計算賓客照片的縮放，使其「填滿 (Cover)」整個畫布
                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = userImg.width / userImg.height;
                    let drawWidth, drawHeight, drawX, drawY;

                    if (imgRatio > canvasRatio) {
                        drawHeight = canvas.height;
                        drawWidth = userImg.width * (canvas.height / userImg.height);
                        drawX = (canvas.width - drawWidth) / 2;
                        drawY = 0;
                    } else {
                        drawWidth = canvas.width;
                        drawHeight = userImg.height * (canvas.width / userImg.width);
                        drawX = 0;
                        drawY = (canvas.height - drawHeight) / 2;
                    }

                    // 3. 開始繪製
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // 先畫賓客照片（底層）
                    ctx.drawImage(userImg, drawX, drawY, drawWidth, drawHeight);
                    
                    // 再疊上婚禮相框（頂層）
                    ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

                    // 4. 輸出成圖片格式，讓手機可以長按儲存
                    resultImage.src = canvas.toDataURL('image/jpeg', 0.9);
                    resultArea.style.display = 'block';
                    
                    // 恢復上傳區文字
                    placeholderText.innerHTML = `
                        <svg viewBox="0 0 24 24"><path d="M19 12h-2v3H7v-3H5v3c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-3zm-1.41-4.59L13 2.83V13h-2V2.83L7.41 7.41 6 6l6-6 6 6-1.41 1.41z"/></svg>
                        <div>重新上傳照片</div>
                    `;
                    
                    // 自動滾動到結果區域
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
