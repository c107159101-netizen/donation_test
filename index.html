<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>承緯 & 書念's Wedding Photo Booth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e04d75;     /* 配合手繪外框的活力桃粉 */
            --text-main: #5a3a24;         /* 配合手繪插畫的深褐咖啡色 */
            --bg-color: #f7f4eb;          /* 完全提取插畫的溫暖米色底 */
            --card-bg: #ffffff;
            --accent-light: #fbf9f5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            min-height: 100vh;
            letter-spacing: 0.05em;
        }

        /* 標頭與婚禮文字設計 */
        header {
            text-align: center;
            margin-bottom: 25px;
            max-width: 420px;
            width: 100%;
        }

        .wedding-names {
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-main);
            margin: 0 0 25px 0;
            letter-spacing: 0.15em;
        }
        
        .wedding-names span {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin: 0 8px;
        }

        /* 網頁上方的經文手繪感排版 */
        .verse-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(90, 58, 36, 0.05);
            border: 1px solid #eee2d5;
            text-align: left;
            position: relative;
        }

        .verse-zh {
            font-size: 1rem;
            line-height: 1.7;
            margin: 0 0 14px 0;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.08em;
        }

        .verse-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 0;
            color: #7a5c45;
            font-style: italic;
        }

        .verse-ref {
            font-size: 0.85rem;
            color: var(--primary-color);
            margin-top: 8px;
            display: block;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        /* 主卡片容器 */
        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(90, 58, 36, 0.08);
            padding: 24px;
            margin-bottom: 40px;
        }

        /* 上傳工作區 (4:3 比例) */
        .upload-zone {
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: var(--accent-light);
            border: 1px dashed #ced2c9;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .upload-zone:active {
            background-color: #ebdcd0;
        }

        .placeholder-content {
            text-align: center;
            color: #8a7e75;
        }

        .placeholder-content svg {
            width: 32px;
            height: 32px;
            fill: #a3968c;
            margin-bottom: 12px;
        }

        .placeholder-text {
            font-size: 0.9rem;
            font-weight: 400;
        }

        #fileInput {
            display: none;
        }

        /* 結果展示區 */
        .result-zone {
            display: none;
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid #f0e8e2;
            padding-top: 24px;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 0.95rem;
            color: var(--primary-color);
            margin-bottom: 16px;
            font-weight: 500;
        }

        #resultImage {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .save-tip {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #a3968c;
            font-weight: 400;
        }

        /* 網頁最下方的插圖展示區域 */
        .illustration-footer {
            width: 100%;
            max-width: 420px;
            margin-top: 10px;
            text-align: center;
        }

        .illustration-footer img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(90, 58, 36, 0.05);
            border: 1px solid #eee2d5;
        }

        /* 頁尾版權資訊 */
        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #a3968c;
            text-align: center;
        }

        /* 隱藏的畫布 */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="wedding-names">承緯 <span>✧</span> 書念</h1>
        
        <div class="verse-container">
            <p class="verse-zh">兩個人比一個人好，<br>因為一起辛勤工作，共享美好的收穫。</p>
            <p class="verse-en">Two are better than one because they have a good reward for their hard work.</p>
            <span class="verse-ref">— Ec 4:9</span>
        </div>
    </header>

    <div class="main-card">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="placeholder-content" id="placeholderText">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                <div class="placeholder-text">點擊開啟相機或上傳照片</div>
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="result-zone" id="resultArea">
            <div class="result-title">✧ 謝謝您一同見證我們的幸福 ✧</div>
            <img id="resultImage" alt="Wedding Photo">
            <div class="save-tip">長按上方圖片即可儲存至手機</div>
        </div>
    </div>

    <div class="illustration-footer">
        <img src="image_bd0b81.png" alt="Wedding Illustration">
    </div>

    <footer>
        Thank you for being a part of our story.
    </footer>

    <canvas id="canvas"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        const resultImage = document.getElementById('resultImage');
        const placeholderText = document.getElementById('placeholderText');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 預先載入外框
        const frameImage = new Image();
        frameImage.src = '框.png'; 

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            placeholderText.innerHTML = '<div class="placeholder-text" style="letter-spacing:0.1em;">正在為您調整相框...</div>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const userImg = new Image();
                userImg.onload = function() {
                    
                    // 建立 4:3 高解析度畫布
                    canvas.width = 1440; 
                    canvas.height = 1080;

                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = userImg.width / userImg.height;
                    let drawWidth, drawHeight, drawX, drawY;

                    // 滿版縮放算法 (Cover)
                    if (imgRatio > canvasRatio) {
                        drawHeight = canvas.height;
                        drawWidth = userImg.width * (canvas.height / userImg.height);
                        drawX = (canvas.width - drawWidth) / 2;
                        drawY = 0;
                    } else {
                        drawWidth = canvas.width;
                        drawHeight = userImg.height * (canvas.width / userImg.width);
                        drawX = 0;
                        drawY = (canvas.height - drawHeight) / 2;
                    }

                    // 繪製合成
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // 1. 先畫賓客照片
                    ctx.drawImage(userImg, drawX, drawY, drawWidth, drawHeight);
                    
                    // 2. 再疊上婚禮相框
                    ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

                    // 輸出高畫質圖片
                    resultImage.src = canvas.toDataURL('image/jpeg', 0.9);
                    resultArea.style.display = 'block';
                    
                    // 恢復上傳文字狀態
                    placeholderText.innerHTML = `
                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                        <div class="placeholder-text">重新更換照片</div>
                    `;
                    
                    // 平滑滾動到成品畫面
                    setTimeout(() => {
                        resultArea.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
