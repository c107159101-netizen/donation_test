<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>David & Hailey's Wedding Photo Booth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;          /* 全黑背景 */
            --card-bg: #000000;           /* 卡片全黑 */
            --text-main: #fcfaf2;         /* 高級質感奶油白 */
            --text-muted: #d4cfc5;        /* 柔和霧面奶油白 */
            --accent-border: #333333;     /* 暗色極簡邊框 */
            --upload-bg: #121212;         /* 微亮深灰上傳區 */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            letter-spacing: 0.05em;
            font-family: 'JetBrains Mono', 'Noto Sans TC', sans-serif !important;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 440px;
            width: 100%;
        }

        .wedding-title-en {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 2.2rem;
            font-weight: 400;
            line-height: 1.2;
            margin: 0 0 12px 0;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .wedding-names-zh {
            font-family: 'Noto Sans TC', sans-serif !important;
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-muted);
            margin: 0 0 25px 0;
            letter-spacing: 0.2em;
            text-indent: 0.2em;
        }

        .welcome-container {
            border-top: 1px solid var(--accent-border);
            border-bottom: 1px solid var(--accent-border);
            padding: 24px 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .welcome-text-top {
            font-family: 'Noto Sans TC', sans-serif !important;
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0 0 8px 0;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.08em;
        }

        .welcome-text-bottom {
            font-family: 'Noto Sans TC', sans-serif !important;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 0px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--accent-border);
        }

        /* 拍貼互動容器 */
        .booth-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            position: relative;
            background-color: var(--upload-bg);
            border: 1px dashed #444444;
            overflow: hidden;
            touch-action: none;           /* 阻止所有預設瀏覽器滑動手勢 */
        }

        #interactiveCanvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            touch-action: none;           /* 阻止畫布的預設縮放與滾動 */
        }
        #interactiveCanvas:active {
            cursor: grabbing;
        }

        /* 點擊上傳覆蓋層 */
        .upload-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            background-color: var(--upload-bg);
        }

        .placeholder-content {
            text-align: center;
            color: var(--text-main);
        }

        .placeholder-content svg {
            width: 28px;
            height: 28px;
            fill: var(--text-main);
            margin-bottom: 14px;
        }

        .placeholder-text {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }

        /* 控制按鈕區 */
        .control-btns {
            display: none;
            margin-top: 15px;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.1em;
            font-family: 'Noto Sans TC', sans-serif !important;
            transition: all 0.2s ease;
        }
        .btn:active {
            background: #222;
        }

        /* 最終合成導出區 */
        .result-zone {
            display: none;
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid var(--accent-border);
            padding-top: 20px;
            animation: fadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.8rem;
            color: var(--text-main);
            margin-bottom: 16px;
            font-weight: 400;
            letter-spacing: 0.15em;
        }

        #resultImage {
            width: 100%;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.05);
        }

        .save-tip {
            font-family: 'Noto Sans TC', sans-serif !important;
            margin-top: 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="wedding-title-en">David & Hailey</h1>
        <div class="wedding-names-zh">洪承緯 <span>|</span> 劉書念</div>
        
        <div class="welcome-container">
            <p class="welcome-text-top">謝謝你們成為我們故事的一部分</p>
            <p class="welcome-text-bottom">歡迎上傳/拍攝製作婚禮專屬拍貼</p>
        </div>
    </header>

    <div class="main-card">
        <div class="booth-container">
            <div class="upload-overlay" id="uploadOverlay" onclick="document.getElementById('fileInput').click()">
                <div class="placeholder-content">
                    <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                    <div class="placeholder-text">TAKE A PHOTO / UPLOAD</div>
                </div>
            </div>
            <canvas id="interactiveCanvas" width="1440" height="1080"></canvas>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">

        <div class="control-btns" id="controlBtns">
            <button class="btn" onclick="resetBooth()">重新拍照/上傳</button>
            <button class="btn" style="border-color: #fcfaf2;" onclick="generateFinalImage()">確認完成，導出圖片</button>
        </div>

        <div class="result-zone" id="resultArea">
            <div class="result-title">THANK YOU FOR BEING WITH US</div>
            <img id="resultImage" alt="Wedding Photo">
            <div class="save-tip">✦ 長按上方圖片即可儲存至手機 ✦</div>
        </div>
    </div>

    <footer>
        Thank you for being a part of our story.
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadOverlay = document.getElementById('uploadOverlay');
        const controlBtns = document.getElementById('controlBtns');
        const resultArea = document.getElementById('resultArea');
        const resultImage = document.getElementById('resultImage');
        
        const canvas = document.getElementById('interactiveCanvas');
        const ctx = canvas.getContext('2d');

        // 載入相框
        const frameImage = new Image();
        frameImage.src = '框.png'; 
        frameImage.onload = () => { if(!userImg.src) drawStatic(); };

        let userImg = new Image();
        
        // 變數控制
        let imgScale = 1.0;
        let imgX = 0;
        let imgY = 0;
        
        let isDragging = false;
        let startX, startY;
        let startPinchDist = 0;
        let startScale = 1.0;

        function drawStatic() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#121212';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (frameImage.complete) {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (userImg.src) {
                ctx.save();
                ctx.translate(canvas.width / 2 + imgX, canvas.height / 2 + imgY);
                ctx.scale(imgScale, imgScale);
                ctx.drawImage(userImg, -userImg.width / 2, -userImg.height / 2);
                ctx.restore();
            }

            if (frameImage.complete) {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
            }
        }

        function resetBooth() {
            userImg = new Image();
            imgScale = 1.0;
            imgX = 0;
            imgY = 0;
            drawStatic();
            uploadOverlay.style.display = 'flex';
            controlBtns.style.display = 'none';
            resultArea.style.display = 'none';
            fileInput.value = ''; // 清空選擇
            document.getElementById('fileInput').click();
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            uploadOverlay.style.display = 'none';
            controlBtns.style.display = 'grid';
            resultArea.style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(event) {
                userImg = new Image();
                userImg.onload = function() {
                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = userImg.width / userImg.height;

                    if (imgRatio > canvasRatio) {
                        imgScale = (canvas.width * 1.06) / userImg.width;
                    } else {
                        imgScale = (canvas.height * 1.08) / userImg.height;
                    }
                    
                    imgX = 0;
                    imgY = 0;
                    draw();
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 網頁座標轉換
        function getCanvasPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function getPinchDist(e) {
            if (e.touches.length < 2) return 0;
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function handleStart(e) {
            if (!userImg.src) return;
            
            // 強制防止 iPhone 網頁橡皮筋滾動效應與多指縮放
            if(e.cancelable) e.preventDefault(); 
            
            if (e.touches && e.touches.length === 2) {
                isDragging = false;
                startPinchDist = getPinchDist(e);
                startScale = imgScale;
            } else {
                isDragging = true;
                const p = getCanvasPoint(e);
                startX = p.x - imgX;
                startY = p.y - imgY;
            }
        }

        function handleMove(e) {
            if (!userImg.src) return;
            if(e.cancelable) e.preventDefault(); // 核心：鎖定手機網頁背景

            if (e.touches && e.touches.length === 2) {
                const dist = getPinchDist(e);
                if (dist > 0 && startPinchDist > 0) {
                    imgScale = startScale * (dist / startPinchDist);
                    if(imgScale < 0.1) imgScale = 0.1;
                    if(imgScale > 5.0) imgScale = 5.0;
                    draw();
                }
            } else if (isDragging) {
                const p = getCanvasPoint(e);
                imgX = p.x - startX;
                imgY = p.y - startY;
                draw();
            }
        }

        function handleEnd(e) {
            if(e.cancelable) e.preventDefault();
            isDragging = false;
        }

        // 電腦版滾輪支援
        canvas.addEventListener('wheel', function(e) {
            if (!userImg.src) return;
            e.preventDefault();
            if (e.deltaY < 0) imgScale *= 1.05;
            else imgScale /= 1.05;
            if(imgScale < 0.1) imgScale = 0.1;
            if(imgScale > 5.0) imgScale = 5.0;
            draw();
        }, { passive: false });

        // 精準綁定事件並設為不被 passive 阻擋
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        // 導出圖片
        function generateFinalImage() {
            if (!userImg.src) return;
            
            resultImage.src = canvas.toDataURL('image/jpeg', 0.93);
            resultArea.style.display = 'block';
            
            setTimeout(() => {
                resultArea.scrollIntoView({ behavior: 'smooth' });
            }, 150);
        }
    </script>
</body>
</html>
