<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>David & Hailey's Wedding Photo Booth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;          /* 全黑背景 */
            --card-bg: #000000;           /* 卡片全黑 */
            --text-main: #fcfaf2;         /* 高級質感奶油白 */
            --text-muted: #d4cfc5;        /* 柔和霧面奶油白 */
            --accent-border: #333333;     /* 暗色極簡邊框 */
            --upload-bg: #121212;         /* 微亮深灰上傳區 */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 50px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            min-height: 100vh;
            letter-spacing: 0.08em;
        }

        /* 標頭設計 */
        header {
            text-align: center;
            margin-bottom: 35px;
            max-width: 440px;
            width: 100%;
        }

        .wedding-title-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 300;
            font-style: italic;
            line-height: 1.2;
            margin: 0 0 12px 0;
            color: var(--text-main);
            letter-spacing: 0.01em;
            text-shadow: 0 0 1px rgba(252, 250, 242, 0.2); 
        }

        .wedding-names-zh {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin: 0 0 30px 0;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
        }

        /* 奶油白極簡線條經文區塊 */
        .verse-container {
            border-top: 1px solid var(--accent-border);
            border-bottom: 1px solid var(--accent-border);
            padding: 24px 10px;
            margin-bottom: 35px;
            text-align: center;
        }

        .verse-zh {
            font-size: 0.95rem;
            line-height: 1.8;
            margin: 0 0 14px 0;
            font-weight: 400;
            color: var(--text-main);
            letter-spacing: 0.1em;
        }

        .verse-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            line-height: 1.5;
            margin: 0 0 6px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .verse-ref {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: block;
        }

        /* 主工作卡片 */
        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            border-radius: 0px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--accent-border);
        }

        /* 上傳區域 (4:3 比例) */
        .upload-zone {
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: var(--upload-bg);
            border: 1px dashed #444444;
            border-radius: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .upload-zone:active {
            background-color: #1a1a1a;
            transform: scale(0.99);
        }

        .placeholder-content {
            text-align: center;
            color: var(--text-main);
        }

        .placeholder-content svg {
            width: 26px;
            height: 26px;
            fill: var(--text-main);
            margin-bottom: 14px;
            font-weight: 300;
        }

        .placeholder-text {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }

        /* 結果展示區 */
        .result-zone {
            display: none;
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid var(--accent-border);
            padding-top: 24px;
            animation: fadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 18px;
            font-weight: 500;
            letter-spacing: 0.2em;
        }

        #resultImage {
            width: 100%;
            border-radius: 0px;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.05);
        }

        .save-tip {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* 頁尾資訊 */
        footer {
            margin-top: auto;
            padding-top: 40px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-style: italic;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* 隱藏的畫布 */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="wedding-title-en">David & Hailey</h1>
        <div class="wedding-names-zh">洪承緯 <span>|</span> 劉書念</div>
        
        <div class="verse-container">
            <p class="verse-zh">兩個人比一個人好，<br>因為一起辛勤工作，共享美好的收穫。</p>
            <p class="verse-en">Two are better than one because they have a good reward for their hard work.</p>
            <span class="verse-ref">— Ecclesiastes 4:9</span>
        </div>
    </header>

    <div class="main-card">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="placeholder-content" id="placeholderText">
                <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                <div class="placeholder-text">TAKE A PHOTO / UPLOAD</div>
            </div>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="result-zone" id="resultArea">
            <div class="result-title">✦ THANK YOU FOR BEING WITH US ✦</div>
            <img id="resultImage" alt="Wedding Photo">
            <div class="save-tip">長按上方圖片即可儲存至手機</div>
        </div>
    </div>

    <footer>
        Thank you for being a part of our story.
    </footer>

    <canvas id="canvas"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        const resultImage = document.getElementById('resultImage');
        const placeholderText = document.getElementById('placeholderText');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const frameImage = new Image();
        frameImage.src = '框.png'; 

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            placeholderText.innerHTML = '<div class="placeholder-text">PROCESSING...</div>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const userImg = new Image();
                userImg.onload = function() {
                    
                    // 建立高清晰度 4:3 畫布
                    canvas.width = 1440; 
                    canvas.height = 1080;

                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = userImg.width / userImg.height;
                    let drawWidth, drawHeight, drawX, drawY;

                    // 調整為 Contain 演算法：完整保留原圖，絕不裁剪
                    if (imgRatio > canvasRatio) {
                        // 照片較寬，以畫布寬度為基準縮放
                        drawWidth = canvas.width;
                        drawHeight = canvas.width / imgRatio;
                        drawX = 0;
                        drawY = (canvas.height - drawHeight) / 2;
                    } else {
                        // 照片較窄，以畫布高度為基準縮放
                        drawHeight = canvas.height;
                        drawWidth = canvas.height * imgRatio;
                        drawX = (canvas.width - drawWidth) / 2;
                        drawY = 0;
                    }

                    // 繪製與合成
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // 背景填滿純黑（避免不合比例的照片露出透明底）
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 1. 繪製完整原圖照片
                    ctx.drawImage(userImg, drawX, drawY, drawWidth, drawHeight);
                    
                    // 2. 疊上相框
                    ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

                    // 輸出高畫質 JPEG
                    resultImage.src = canvas.toDataURL('image/jpeg', 0.9);
                    resultArea.style.display = 'block';
                    
                    placeholderText.innerHTML = `
                        <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                        <div class="placeholder-text">RETAKE / CHOOSE ANOTHER</div>
                    `;
                    
                    setTimeout(() => {
                        resultArea.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
